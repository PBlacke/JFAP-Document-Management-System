<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Document</title>
    <link rel="icon" href="{{ url_for('static', filename='fav.png') }}" type="image/png">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { color: #333; }
        label { display: block; margin: 15px 0 5px; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #415f97; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2c3e6b; }
        .nav { margin-bottom: 20px; }
        .nav a { color: #415f97; text-decoration: none; margin-right: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Home</a>
            <a href="/documents">All Documents</a>
        </div>
        <h1>Edit Document</h1>
        <form method="POST">
            <label for="filename">Filename (without extension):</label>
            <input type="text" id="filename" name="filename" value="{{ filename }}" required>
            <p style="color: #666; font-size: 0.9em;">The file extension will be preserved automatically.</p>
            <button type="submit">Save Changes</button>
        </form>
    </div>
</body>
</html>
